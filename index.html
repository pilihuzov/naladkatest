let questions = [], index = 0, correct = 0, selected = null, time = 3600, interval, results = [];
const $ = id => document.getElementById(id);

$("startBtn").onclick = start;
$("next").onclick = next;
$("restart").onclick = () => location.reload();

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function start() {
  correct = 0;
  results = [];
  questions = shuffle([...data]);
  $("start").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  interval = setInterval(tick, 1000);
  render();
}

function tick() {
  if (time <= 0) { finish(); return; }
  time--;
  const m = String(Math.floor(time / 60)).padStart(2, "0");
  const s = String(time % 60).padStart(2, "0");
  $("timer").textContent = `${m}:${s}`;
  if (time <= 300) $("timer").classList.add("warn");
}

function render() {
  selected = null;
  const item = questions[index];
  $("question").textContent = `${index + 1}. ${item.q}`;
  $("count").textContent = `Вопрос ${index + 1} из ${questions.length}`;
  $("answered").textContent = `Правильных: ${correct}`;
  $("bar").style.width = `${index / questions.length * 100}%`;
  $("feedback").innerHTML = "";
  $("next").disabled = true;

  // Формируем варианты: правильный + 3 неправильных из item.wrong
  let wrongAnswers = item.wrong && item.wrong.length >= 3 ? item.wrong.slice(0, 3) : ["Ошибка 1", "Ошибка 2", "Ошибка 3"];
  const answers = shuffle([item.correct, ...wrongAnswers]);

  $("options").innerHTML = answers.map((a, n) => `
    <button class="option" type="button" data-answer="${encodeURIComponent(a)}">
      <span class="letter">${"АБВГ"[n]}</span>
      <span>${a}</span>
    </button>`).join("");

  document.querySelectorAll(".option").forEach(btn => {
    btn.onclick = () => choose(btn, decodeURIComponent(btn.dataset.answer));
  });
}

function choose(btn, value) {
  if (selected !== null) return;
  selected = value;

  const right = questions[index].correct;
  const ok = value === right;
  if (ok) correct++;

  results.push({ q: questions[index].q, value, right, ok });

  document.querySelectorAll(".option").forEach(x => {
    const ans = decodeURIComponent(x.dataset.answer);
    if (ans === right) x.classList.add("correct");
    if (ans === value) x.classList.add("selected");
  });

  if (!ok) btn.classList.add("wrong");

  $("feedback").innerHTML = `
    <div class="answer ${ok ? "" : "bad"}">
      ${ok ? "✅ Верно!" : "❌ Неверно."}
      Правильный ответ: <b>${right}</b>
    </div>`;

  $("next").disabled = false;
  $("answered").textContent = `Правильных: ${correct}`;
}

function next() {
  if (index < questions.length - 1) {
    index++;
    render();
  } else {
    finish();
  }
}

function finish() {
  clearInterval(interval);
  if (selected === null && index < questions.length) {
    const item = questions[index];
    results.push({ q: item.q, value: "(не отвечен)", right: item.correct, ok: false });
  }

  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");

  const total = questions.length;
  const percent = Math.round(correct / total * 100);
  $("score").textContent = `${correct} / ${total}`;
  $("resultText").textContent =
    `Результат: ${percent}%. ${percent >= 70 ? "Тест пройден!" : "Попробуйте ещё раз, чтобы улучшить результат."}`;

  $("review").innerHTML = results
    .filter(x => !x.ok)
    .map(x => `
      <details>
        <summary>❌ ${x.q}</summary>
        <p>Ваш ответ: ${x.value}</p>
        <p><b>Правильный ответ: ${x.right}</b></p>
      </details>`)
    .join("");
}
