<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Тест по наладке станков с ЧПУ</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#6b7280;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--line:#e5e7eb}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:16px/1.45 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit}.wrap{max-width:720px;margin:auto;padding:16px 14px 32px}.top{position:sticky;top:0;z-index:2;background:rgba(244,247,251,.94);backdrop-filter:blur(10px);padding:8px 0 14px}
.brand{display:flex;justify-content:space-between;align-items:center;gap:10px}.title{font-size:20px;font-weight:800}.timer{font-variant-numeric:tabular-nums;background:#111827;color:#fff;border-radius:12px;padding:9px 12px;font-weight:800;white-space:nowrap}.timer.warn{background:var(--red)}
.progress{height:8px;background:#dbe4f1;border-radius:9px;overflow:hidden;margin-top:14px}.bar{height:100%;background:var(--blue);transition:.25s;width:0}
.meta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-top:7px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:22px 18px;box-shadow:0 8px 30px #1d4ed80b;margin-top:12px}
.q{font-size:21px;line-height:1.3;font-weight:750;margin:0 0 20px}.option{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:15px;padding:14px;margin:10px 0;color:var(--text);cursor:pointer;transition:.15s}.option:hover,.option:focus{border-color:#93b4f8;background:#f8fbff;outline:2px solid #93b4f8;outline-offset:2px}.option.selected{border-color:var(--blue);background:#eff6ff}.option.correct{border-color:var(--green);background:#f0fdf4}.option.wrong{border-color:var(--red);background:#fef2f2}
.letter{flex:none;width:28px;height:28px;border-radius:50%;display:grid;place-items:center;background:#eef2f7;font-weight:800;color:#475569}.selected .letter{background:var(--blue);color:#fff}
.answer{margin-top:15px;border-radius:14px;padding:12px 14px;background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}.answer.bad{background:#fef2f2;color:#991b1b;border-color:#fecaca}.actions{display:flex;gap:10px;margin-top:18px}.btn{border:0;border-radius:14px;padding:14px 18px;font-weight:700;cursor:pointer}.primary{background:var(--blue);color:#fff;flex:1}.btn:disabled{opacity:.45;cursor:not-allowed}.intro{text-align:center}.intro h1{font-size:28px;margin:8px 0}.intro p{color:var(--muted)}.big{font-size:46px;margin:12px}.result{text-align:center}.score{font-size:48px;font-weight:900;color:var(--blue)}.review{text-align:left;margin-top:20px}.review details{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px;margin:8px 0}.review summary{cursor:pointer;font-weight:650}.hidden{display:none!important}
@media(max-width:430px){.wrap{padding:10px}.card{padding:18px 14px;border-radius:18px}.q{font-size:19px}.option{padding:12px}.title{font-size:18px}}
</style>

<body>
<main class="wrap">
<section id="start" class="card intro">
<div class="big">⚙️</div>
<h1>Тест по наладке оборудования</h1>
<p>Проверка знаний по ЧПУ, наладке, диагностике и охране труда.</p>
<p><b>⏱ 60 минут</b><br>На экране отображается только один вопрос.</p>
<button class="btn primary" id="startBtn">Начать тест</button>
</section>

<section id="quiz" class="hidden">
<header class="top">
<div class="brand"><div class="title">⚙️ Проверка знаний</div><div id="timer" class="timer">60:00</div></div>
<div class="progress"><div id="bar" class="bar"></div></div>
<div class="meta"><span id="count"></span><span id="answered"></span></div>
</header>
<article class="card">

<div id="options"></div>
<div id="feedback"></div>
<div class="actions"><button id="next" class="btn primary" disabled>Следующий вопрос&nbsp; →</button></div>
</article>
</section>

<div class="big">🏁</div>
<h1>Тест завершён</h1>
<div id="score" class="score"></div>
<p id="resultText"></p>
<button class="btn primary" id="restart">Пройти заново</button>
<div id="review" class="review"></div>
</section>
</main>

<script>
const data = [
  ["Какие станки, предназначенные для обработки плоских и пространственных корпусных деталей?","Обычно применяются фрезерные, сверлильно-расточные, горизонтально-расточные, координатно-расточные и многоцелевые станки с ЧПУ. Для сложных пространственных поверхностей используют 3-, 4- и 5-координатные обрабатывающие центры."],
  ["Как называется способ программирования, при котором координаты точек отсчитываются от постоянного начала координат?","Абсолютное программирование. В системах ЧПУ обычно задаётся кодом G90."],
  ["Как называются коды с адресом G?","Подготовительные, или G-коды. Они задают режимы перемещения, обработки, системы координат и циклы."],
  ["Как называются коды, действующие только в том кадре, в котором они находятся?","Однокадровые, или немодальные коды. После выполнения кадра их действие прекращается."],
  ["Какая функциональная группа кодов отвечает за перемещение?","Группа кодов движения инструмента: G00, G01, G02, G03 и другие коды интерполяции."],
  ["Каким вспомогательным кодом программируется конец программы, перевод курсора в начало программы?","Обычно M30 — конец программы с перемоткой курсора в начало. В некоторых системах также используется M02, но он не всегда выполняет перемотку."],
  ["Каким вспомогательным кодом можно остановить вращение шпинделя?","M05 — останов шпинделя."],
  ["Как называется стандартный язык для управления станком?","Международный стандартный язык программирования станков с ЧПУ — ISO-код, или G-код. Управляющая программа также включает M-, S-, T-, F-коды."],
  ["Какую компенсацию инструмента вы знаете?","Компенсацию длины инструмента, радиуса инструмента, износа инструмента, коррекцию положения инструмента и компенсацию радиуса при фрезеровании — G41/G42."],
  ["Какие виды систем ЧПУ вы знаете?","Позиционные, контурные, комбинированные, цикловые, разомкнутые и замкнутые. По числу управляемых координат — 2-, 3-, 4-, 5-координатные и более."],
  ["Как называются коды с адресом М?","Вспомогательные, или технологические, M-коды. Они управляют шпинделем, охлаждением, сменой инструмента, остановами и завершением программы."],
  ["Как называются коды, которые могут действовать бесконечно долго, пока их не отменят другим кодом?","Модальные коды. Например, G01 продолжает действовать, пока не будет заменён другим режимом движения."],
  ["Какая функциональная группа кодов отвечает за работу в дюймовой метрической системе координат?","G20 — дюймовая система; G21 — метрическая система."],
  ["Каким кодом программируется ускоренное перемещение инструмента?","G00."],
  ["Каким кодом программируется перемещение инструмента на рабочей подаче?","G01 — линейное перемещение с рабочей подачей."],
  ["Каким кодом программируется перемещение инструмента по дуге по часовой стрелке?","G02. Направление определяется относительно плоскости обработки и принятой системы координат."],
  ["Каким вспомогательным кодом программируется запрограммированный останов?","M01 — условный, или программируемый останов. Он выполняется при включённом режиме Optional Stop."],
  ["Как программируется вращение шпинделя по часовой стрелке?","M03 с указанием частоты вращения, например M03 S1500."],
  ["Какой вспомогательный код предназначен для автоматической смены инструмента?","Обычно M06. Номер инструмента задаётся кодом T, например T05 M06."],
  ["Каким подготовительным кодом программируется стандартный цикл сверления?","G81 — стандартный цикл сверления. В зависимости от стойки могут применяться G82, G83 и другие циклы."],
  ["Что вы понимаете под управлением станком?","Это целенаправленное воздействие на механизмы, приводы и системы станка для выполнения заданной последовательности операций с требуемыми режимами и точностью."],
  ["На какие группы подразделяются станки с программным управлением (ПУ) по виду управления?","На станки с позиционным, контурным и комбинированным управлением. Также выделяют станки с цикловым и числовым программным управлением."],
  ["Что такое циклы обработки в ЧПУ?","Это заранее запрограммированные последовательности типовых операций: сверления, растачивания, нарезания резьбы, снятия фасок и т. п. Цикл вызывается одной или несколькими командами."],
  ["Что такое многоцелевой станок?","Станок, выполняющий несколько видов обработки, например фрезерование, сверление, растачивание и нарезание резьбы, часто с автоматической сменой инструмента."],
  ["Какие типы инструмента используются для фрезерования?","Торцевые, концевые, дисковые, цилиндрические, угловые, фасонные, радиусные, Т-образные, резьбовые и сверлильно-фрезерные инструменты. Они бывают цельными, сборными, твердосплавными и со сменными пластинами."],
  ["Что необходимо сделать перед началом наладки станка с ЧПУ?","Изучить чертёж, технологию, программу и паспорт станка; проверить исправность станка, инструмента, оснастки, ограждений, СОЖ, смазки и аварийной остановки; выполнить блокировку опасных зон."],
  ["Что такое «смещение инструмента» (tool offset)?","Это поправка, учитывающая фактическую длину, радиус и износ инструмента относительно базовой точки станка."],
  ["Какие действия необходимо предпринять при обнаружении отклонений в размерах обработанной детали от чертежа?","Остановить обработку, проверить измерения и состояние измерительного инструмента, крепление детали, износ инструмента, коррекции, программу и режимы. После выявления причины внести допустимую коррекцию и выполнить контрольную обработку."],
  ["Какие основные виды технического обслуживания станков с ЧПУ входят в обязанности наладчика?","Ежесменный осмотр, очистка, смазка, проверка креплений, уровней жидкостей, фильтров, направляющих, приводов, датчиков, кабелей и аварийных устройств. Также выполняются плановое ТО, диагностика и участие в ремонте."],
  ["Что такое «точка обнуления» заготовки (Workpiece Zero) на токарном станке?","Это выбранная технологическая нулевая точка детали, относительно которой задаются координаты программы. На токарном станке обычно X0 находится на оси вращения, а Z0 — на торце детали."],
  ["Что необходимо проверить при появлении вибраций при обработке?","Жёсткость крепления детали и инструмента, вылет инструмента, состояние подшипников и шпинделя, биение, режимы резания, балансировку, износ инструмента, работу направляющих и наличие люфтов."],
  ["Что такое технология наладки?","Это установленная последовательность подготовки, регулировки, проверки и испытания оборудования для обеспечения его безопасной и устойчивой работы."],
  ["Что важно учитывать при наладке оборудования?","Безопасность, требования паспорта, технологический процесс, точность, производительность, состояние узлов, правильность установок и возможность последующего обслуживания."],
  ["Что такое регламентная наладка?","Плановая наладка, выполняемая через установленные интервалы или после определённого объёма работы по технологической карте и графику ТО."],
  ["Какой основополагающий документ определяет порядок наладки и ремонта оборудования?","Техническая и эксплуатационная документация изготовителя: паспорт, руководство по эксплуатации, ремонтные и наладочные инструкции. На предприятии дополнительно применяются технологические карты, графики ТО и локальные инструкции."],
  ["Какой вид оборудования может обслуживать наладчик 4-го разряда?","Оборудование средней сложности, его агрегаты, механические, гидравлические, пневматические и электрические системы в пределах квалификации и инструкции. Точный перечень определяется ЕТКС, должностной инструкцией и локальными документами."],
  ["Каковы основные обязанности и ответственность наладчика 4-го разряда согласно ЕТКС?","Наладка, регулировка и проверка оборудования средней сложности; устранение неисправностей; контроль режимов работы; выполнение пробных запусков; соблюдение требований охраны труда и качества. Работник отвечает за правильность выполненной работы и безопасность своих действий."],
  ["Перечислите основные нормативные документы (ГОСТы, ОСТы, ТУ), регламентирующие наладку и эксплуатацию оборудования/систем.","Технический регламент о безопасности машин и оборудования, ГОСТ 12.0.230, ГОСТ 12.2.003, ГОСТ 12.2.009, ГОСТ 12.1.019, ГОСТ 12.1.030, ГОСТ 12.1.004, ГОСТ 12.1.010, ГОСТ 8.051, ГОСТ 2789, ГОСТ 22267, ГОСТ 8.311, ГОСТ 30893.1, ГОСТ 15.001, ГОСТ Р МЭК 60204-1, ПУЭ, Правила по охране труда и эксплуатационная документация станка."],
  ["Что такое допуски и посадки? Как они обозначаются на чертежах? Каково их значение при наладке?","Допуск — допустимое поле отклонений размера. Посадка определяет характер соединения деталей: зазор, переходная или с натягом. Обозначаются, например, H7/h6, Ø25 +0,02/0. При наладке по ним выбирают инструмент, зазоры, режимы и контролируют качество."],
  ["Какие основные параметры работы оборудования/систем вы контролируете и регулируете?","Размеры и точность, частоту вращения, подачу, усилие и момент, давление, расход, температуру, вибрацию, положение, скорость, время цикла, уровень смазки и СОЖ, электрический ток и напряжение."],
  ["Какие виды приводов используются на оборудовании? Их преимущества и недостатки.","Электрические — точные, удобные и чистые, но требуют защиты и настройки. Гидравлические — мощные и плавные, но возможны утечки и нагрев масла. Пневматические — простые и быстрые, но менее точные и шумные. Механические — надёжные и энергонезависимые, но сложнее перенастраиваются."],
  ["Устройство и принцип работы основных сборочных единиц (суппорты, столы, шпиндельные узлы, захватные устройства)?","Суппорт перемещает инструмент по направляющим. Стол закрепляет и перемещает заготовку. Шпиндельный узел состоит из шпинделя, подшипников, привода и системы зажима инструмента или детали. Захватное устройство фиксирует заготовку или инструмент с помощью кулачков, цанг, гидравлики, пневматики или механического зажима."],
  ["Какие типы подшипников качения и скольжения вы знаете? Как определить их состояние при диагностике? Правила их смазки.","Подшипники качения бывают шариковые, роликовые, игольчатые, конические и сферические. Подшипники скольжения бывают втулочные, вкладышевые, гидродинамические и гидростатические. Проверяют шум, нагрев, люфт, вибрацию, состояние дорожек и смазки. Смазывают только указанным материалом и в требуемом количестве; избыток смазки также вреден."],
  ["Назначение, устройство и принцип работы типовых гидравлических или пневматических компонентов.","Насос или компрессор создаёт поток рабочей среды. Клапаны регулируют давление и защищают систему. Распределители направляют поток. Фильтры очищают масло или воздух. Редуктор снижает и стабилизирует давление. Цилиндры преобразуют энергию среды в возвратно-поступательное движение."],
  ["Устройство и назначение основных элементов электрических цепей оборудования.","Автоматы и предохранители защищают от короткого замыкания и перегрузки. Контакторы и пускатели включают двигатели. Реле выполняют коммутацию и защиту по заданным параметрам. Датчики формируют сигналы о состоянии оборудования. Электродвигатели преобразуют электрическую энергию в механическую."],
  ["Как проверить целостность цепи, наличие напряжения, «фазу» и «ноль»? Какие приборы для этого используются?","Целостность проверяют мультиметром в режиме прозвонки при снятом напряжении. Напряжение измеряют мультиметром или указателем напряжения. Фазу определяют двухполюсным указателем или измерением относительно PE/N. Работать необходимо в СИЗ, с исправным прибором и соблюдением электробезопасности."],
  ["Назначение и принцип действия основных датчиков, используемых на оборудовании.","Концевые выключатели фиксируют крайнее положение. Датчики положения определяют координату узла. Датчики давления, температуры и расхода контролируют соответствующие параметры. Энкодеры преобразуют вращение или перемещение в электрические импульсы. Индуктивные датчики обнаруживают металл, ёмкостные — различные материалы и уровень."],
  ["Что такое релейно-контактные схемы? Как читать простейшие электрические схемы управления?","Это схемы, где логика управления реализуется контактами реле, кнопок, выключателей и катушками исполнительных аппаратов. Схему читают от цепи питания через защиту, органы управления и контакты к катушке или нагрузке."],
  ["Основы работы с программируемыми логическими контроллерами (ПЛК): что это такое, для чего используется, как понять, что ПЛК в рабочем режиме/в ошибке? Как считать простую программу?","ПЛК — промышленный контроллер, обрабатывающий сигналы датчиков и управляющий исполнительными механизмами. Рабочее состояние отображается индикатором RUN, ошибка — ERROR/FAULT и диагностическим сообщением."],
  ["Опишите последовательность операций при комплексной наладке типового агрегата/линии после ремонта или монтажа.","Проверить комплектность и документацию, осмотреть монтаж, проверить крепления, заземление, защиту, смазку и рабочие среды. Затем выполнить ручную проверку, пробный запуск без нагрузки, настройку приводов и датчиков, запуск под нагрузкой, контроль качества продукции и оформление документации."],
  ["Какие инструменты и приборы используются для диагностики неисправностей?","Механические: ключи, съёмники, индикаторы, щупы, уровни, виброметры. Электрические: мультиметр, мегаомметр, токовые клещи, осциллограф, указатель напряжения. Гидравлические: манометры, расходомеры, термометры. Пневматические: манометры, течеискатели, расходомеры."],
  ["Как определить и устранить люфты, перекосы, вибрации в механических узлах?","Измерить люфт индикатором, проверить крепления, направляющие, подшипники, передачи и соосность. Устранение выполняют подтяжкой, регулировкой, заменой изношенных деталей, выверкой, балансировкой и правильным выбором режимов."],
  ["Методы регулировки зазоров в подшипниках, передачах, направляющих.","Используют регулировочные гайки, прокладки, втулки, клинья, эксцентрики, подбор сопряжённых деталей и предварительный натяг. Контроль выполняют индикатором, щупом, измерением момента проворачивания и проверкой нагрева."],
  ["Как настроить и отрегулировать работу гидравлического или пневматического контура?","Проверить герметичность, фильтры, уровень и тип рабочей жидкости, затем установить давление редукционным или предохранительным клапаном. Скорость регулируют дросселями, расход — регулирующими клапанами. Настройку выполняют по манометрам и технологическим параметрам."],
  ["Как настроить и отрегулировать параметры работы электропривода?","Через параметры преобразователя частоты или сервопривода задают скорость, момент, ускорение, торможение, пределы тока и направление вращения. Перед настройкой проверяют двигатель, кабели, заземление, нагрузку и аварийные цепи."],
  ["Как проверить и настроить точность позиционирования узлов оборудования?","Используют индикатор, лазерный интерферометр, линейку, эталонную деталь или измерительную систему. Сравнивают заданное и фактическое положение, определяют люфт и повторяемость, затем вводят коррекции и повторяют измерения."],
  ["Методы центровки валов (муфт). Какие инструменты применяются?","Применяют метод линейки и щупа, индикаторный метод и лазерную центровку. Используются индикаторы часового типа, магнитные стойки, лазерные центровщики, щупы и регулировочные прокладки."],
  ["Как выявлять и устранять утечки рабочих жидкостей?","Очистить узел, определить место утечки визуально или течеискателем, снять давление, подтянуть соединение либо заменить уплотнение, шланг или трубку. После ремонта проверить герметичность под рабочим давлением."],
  ["Порядок действий при обнаружении неисправности оборудования, представляющей опасность. Сигналы остановки.","Немедленно нажать аварийный останов или отключить оборудование безопасным способом, предупредить людей, оградить опасную зону и сообщить ответственному лицу. Нельзя возобновлять работу до устранения неисправности."],
  ["Правила блокировки и маркировки оборудования при проведении наладочных работ (система LOTO).","Остановить оборудование, отключить все источники энергии, сбросить давление и накопленную энергию, установить личный замок и бирку с данными работника. Проверить отсутствие энергии, выполнить работу и снять блокировку только после проверки безопасности."],
  ["Какие смазочные материалы применяются на оборудовании? Правила смазки узлов. Меры безопасности.","Используют масла, пластичные смазки, специальные эмульсии, консистентные и высокотемпературные составы. Смазка выполняется по карте и в установленном количестве. Нельзя смешивать несовместимые материалы; следует применять перчатки, защищать глаза и убирать проливы."],
  ["Основные правила эксплуатации оборудования после наладки. Что должно быть указано в отчете о наладке?","Оборудование эксплуатируют в пределах паспорта, регулярно очищают, смазывают и контролируют. В отчёте указывают объект, дату, исполнителей, выполненные работы, настройки, измеренные параметры, выявленные дефекты, заменённые детали, результаты испытаний и допуск к работе."],
  ["Порядок сдачи оборудования из ремонта/наладки в эксплуатацию. Какие проверки и испытания проводятся?","Проверяют комплектность, ограждения, заземление, аварийную остановку, работу на холостом ходу и под нагрузкой, точность, шум, вибрацию, утечки, температуру и качество продукции. Результаты оформляют актом, оборудование передают ответственному лицу."],
  ["Как правильно подобрать и использовать режущий и слесарно-монтажный инструмент?","Инструмент выбирают по материалу детали, операции, размеру крепежа и требуемой точности. Нельзя использовать повреждённые ключи, отвёртки или зубила, удлинять ключи случайными трубами и работать неподходящим инструментом. Режущий инструмент должен быть исправным и правильно закреплён."],
  ["Назначение и правила применения контрольно-измерительного инструмента.","Штангенциркуль измеряет наружные, внутренние размеры и глубину; микрометр — точные наружные размеры; нутромер — внутренние; индикатор — биение и перемещения; угломер — углы; щупы — зазоры. Инструмент должен быть поверен, чистым, без ударов и применяться без чрезмерного усилия."],
  ["Какие требования к качеству наладки вы должны обеспечить? Как проверить качество выполненной наладки?","Оборудование должно работать безопасно, устойчиво, с заданной точностью, производительностью и без недопустимых шумов, вибраций и утечек. Проверяют контрольными измерениями, пробным циклом, обработкой детали, испытанием защит и оформлением протокола."],
  ["Что такое геометрическая точность станка с ЧПУ?","Это соответствие фактической формы, взаимного положения и перемещений узлов станка установленным нормам: прямолинейность, плоскостность, перпендикулярность, параллельность, биение и точность осей."],
  ["Какой инструмент используется для проверки прямолинейности перемещений осей станка?","Проверочная линейка и индикатор, оптические приборы, лазерный интерферометр или система лазерной геометрии. Выбор зависит от класса точности и требований стандарта."],
  ["Какой стандарт регулирует проверку точности станков?","Основным является ГОСТ 8.311-2016 для нормирования и проверки точности станков; также применяются ГОСТ 22267, ГОСТ 2789, ГОСТ 30893.1 и стандарты ISO 230."],
  ["Что такое цеховое программирование?","Составление и корректировка управляющих программ непосредственно в цехе, у станка или в локальной CAM-системе с учётом конкретной оснастки, инструмента и условий обработки."],
  ["Сколько основных групп обрабатываемости материалов выделяет стандарт ISO?","Обычно выделяют шесть основных групп ISO: P — стали, M — нержавеющие стали, K — чугуны, N — цветные металлы, S — жаропрочные сплавы и титан, H — закалённые материалы."],
  ["Какой символ в управляющей программе (УП) указывает на пропуск кадра?","Символ «/» в начале кадра. Он используется при включённом режиме пропуска кадров."],
  ["Что означает аббревиатура CAD?","Computer-Aided Design — автоматизированное проектирование, САПР."],
  ["Что означает аббревиатура CAM?","Computer-Aided Manufacturing — автоматизированная подготовка и управление производством, включая создание управляющих программ для станков."],
  ["Какие виды и устройства крепления режущего инструмента на станках с ЧПУ вы знаете?","Цанговые патроны, Weldon-патроны, гидропатроны, термопатроны, оправки HSK, ISO, BT, Capto, патроны для резьбонарезания и сверлильные патроны."],
  ["Что такое программируемое ограничение рабочей зоны в станках с ЧПУ?","Это ограничение перемещений инструмента программными координатами, предотвращающее выход в опасную область. Например, функции G22/G23 или аналогичные, в зависимости от системы ЧПУ."],
  ["Что такое контактная измерительная система в станках с ЧПУ?","Это щуп с датчиком касания, который автоматически определяет положение заготовки, размеры детали или длину инструмента и передаёт координаты в ЧПУ."],
  ["Какой этап наладки позволяет избежать столкновений инструмента с заготовкой или элементами оборудования?","Проверка управляющей программы: симуляция, графический просмотр, сухой прогон, покадровое выполнение и проверка траектории с увеличенными безопасными зазорами."],
  ["Что характеризует понятие «повторяемость» в контексте точности станков с ЧПУ?","Способность станка многократно возвращаться в одну и ту же координату с минимальным разбросом фактического положения."],
  ["Какие датчики используются для контроля шероховатости поверхности детали?","Контактные профилометры с алмазным щупом и бесконтактные оптические, лазерные или интерферометрические профилометры."],
  ["Как часто рекомендуется проводить техническое обслуживание станков с ЧПУ?","Ежесменно — осмотр и очистка; периодическое ТО — по паспорту, графику предприятия и наработке. Обычно применяются интервалы ежемесячного, квартального, полугодового и годового обслуживания."],
  ["Какой инструктаж проводится при приеме на работу?","Вводный инструктаж по охране труда, затем первичный инструктаж на рабочем месте до начала самостоятельной работы."],
  ["Какие причины производственного травматизма?","Неисправное оборудование, нарушение инструкций, отсутствие ограждений и СИЗ, неудовлетворительная организация рабочего места, недостаточное обучение, усталость, спешка, воздействие электричества, движущихся частей, давления, температуры и химических веществ."],
  ["Какие помещения по степени опасности поражения людей электрическим током вы знаете?","Помещения без повышенной опасности, с повышенной опасностью и особо опасные. К факторам опасности относятся сырость, токопроводящая пыль, высокая температура, токопроводящие полы и возможность одновременного прикосновения к заземлённым конструкциям и токоведущим частям."],
  ["Какая норма освещенности в мастерской металлообработки для ламп накаливания?","Для типовой работы на металлорежущих станках обычно принимают около 200–300 лк общего освещения и повышенную местную освещённость. Норму необходимо уточнять по действующим СП и санитарным требованиям."],
  ["Какой установлен допустимый уровень звука на рабочих местах санитарными нормами?","Для постоянных рабочих мест обычно ориентируются на 80 дБА для эквивалентного уровня шума, если иное не установлено действующими санитарными нормами."],
  ["Какой инструктаж проводится при нарушении рабочими требований безопасности труда, которые привели к травме, аварии, взрыву или пожару?","Внеплановый инструктаж. При необходимости проводится дополнительное обучение и проверка знаний."],
  ["Какой минимальный переменный ток считается смертельно опасным для человека?","Опасным для жизни может быть ток уже от 30 мА, а ток около 50–100 мА переменного тока промышленной частоты часто рассматривается как смертельно опасный."],
  ["Что относится к первичным средствам пожаротушения?","Огнетушители, пожарные краны, вода, песок, пожарные покрывала, ящики с инвентарём, лопаты, ведра и другие средства для локализации небольшого возгорания."],
  ["Какие огнетушители применяются для тушения электроустановок, находящихся под напряжением, и щелочных металлов?","Для электроустановок под напряжением обычно применяют углекислотные или специальные порошковые огнетушители. Для щелочных металлов применяют специальные порошки класса D. Воду и обычную пену использовать нельзя."],
  ["Какая устанавливается сокращенная продолжительность рабочего времени?","Для работников 16–18 лет — не более 35 часов в неделю; для работников на вредных условиях — не более 36 часов в неделю; для инвалидов I–II группы — не более 35 часов в неделю."],
  ["Какая периодичность проведения повторного инструктажа?","Не реже одного раза в шесть месяцев, если для отдельных видов работ нормативами не установлен более короткий срок."],
  ["Доступ рабочих к выполнению работ повышенной опасности.","Допускаются обученные и проинструктированные работники, прошедшие проверку знаний, медицинский осмотр и имеющие необходимую квалификацию. Для работ по наряду-допуску требуется оформление наряда."],
  ["Очередная аттестация рабочих мест проводится?","В современной терминологии применяется специальная оценка условий труда — СОУТ. Она проводится, как правило, не реже одного раза в пять лет."],
  ["Какой проводится инструктаж при производстве работ, на которые оформляется наряд-допуск?","Целевой инструктаж. Он проводится непосредственно перед выполнением конкретной работы по наряду-допуску."],
  ["На кого возлагаются обязанности по обеспечению здоровых и безопасных условий труда?","На работодателя. Руководители подразделений обеспечивают безопасность на своих участках, а работники обязаны соблюдать инструкции, применять СИЗ и сообщать об опасностях."],
  ["Что должен сделать рабочий при обнаружении неисправности оборудования, приспособлений, инструмента и средств индивидуальной защиты?","Прекратить работу, отключить оборудование безопасным способом, сообщить руководителю и не использовать неисправные средства до их ремонта или замены."],
  ["Что должен делать рабочий в случае возникновения несчастного случая?","Немедленно сообщить руководителю, оказать пострадавшему первую помощь в пределах своих знаний, вызвать медицинскую помощь, по возможности сохранить обстановку происшествия и не подвергать себя опасности."],
  ["Какое максимальное время, на которое может быть наложен жгут или закрутка для прекращения кровотечения?","Ориентировочно: зимой — до 60 минут, летом — до 90 минут для конечности; при необходимости жгут контролируют и как можно скорее передают пострадавшего медикам."],
  ["Как оказать первую помощь при ушибах?","Обеспечить покой, приложить холод через ткань на 15–20 минут, приподнять повреждённую конечность. Не массировать и не прогревать сразу после травмы."],
  ["Какие мероприятия проводятся для предотвращения поражений электрическим током?","Изоляция и ограждение токоведущих частей, защитное заземление и зануление, автоматическое отключение, УЗО, применение пониженного напряжения, блокировки, исправный инструмент и СИЗ, допуск обученного персонала и соблюдение LOTO."],
  ["В течение какого времени расследуется несчастный случай на производстве и оформляется актом формы Н-1?","Лёгкий несчастный случай обычно расследуется в течение трёх календарных дней, тяжёлый или смертельный — в течение 15 календарных дней."],
  ["Продолжительность рабочего времени в возрасте от 16 до 18 лет составляет?","Не более 35 часов в неделю."],
  ["Со скольки часов считается работа в ночное время?","Ночным временем считается период с 22:00 до 06:00."],
  ["Какой период времени хранения актов о несчастном случае на производстве?","Акты и материалы расследования обычно хранятся 45 лет."],
  ["Сколько должна составлять продолжительность еженедельного непрерывного отдыха?","Не менее 42 часов."],
  ["Кто проводит первичный инструктаж на рабочем месте?","Непосредственный руководитель работ: мастер, начальник участка, бригадир или другое назначенное приказом лицо, прошедшее обучение и проверку знаний."],
  ["Сколько составляет продолжительность рабочего времени для работников?","Нормальная продолжительность рабочего времени — не более 40 часов в неделю, обычно 8 часов в день при пятидневной рабочей неделе."]
].map(([q,a])=>({q,a}));

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function start() {
  correct = 0;
  questions = shuffle([...data]);
  $("start").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  interval = setInterval(tick, 1000);
  render();
}

function tick() {
  if (time <= 0) { finish(); return; }
  time--;
  const m = String(Math.floor(time / 60)).padStart(2, "0");
  const s = String(time % 60).padStart(2, "0");
  $("timer").textContent = `${m}:${s}`;
  if (time <= 300) $("timer").classList.add("warn");
}

function render() {
  selected = null;
  const item = questions[index];
  $("question").textContent = `${index + 1}. ${item.q}`;
  $("count").textContent = `Вопрос ${index + 1} из ${questions.length}`;
  $("answered").textContent = `Правильных: ${correct}`;
  $("bar").style.width = `${index / questions.length * 100}%`;
  $("feedback").innerHTML = "";
  $("next").disabled = true;

  const wrong = data.filter(x => x.a !== item.a).map(x => x.a);
  const answers = shuffle([item.a, ...shuffle(wrong).slice(0, 3)]);

  $("options").innerHTML = answers.map((a, n) => `
    <button class="option" type="button" data-answer="${encodeURIComponent(a)}">
      <span class="letter">${"АБВГ"[n]}</span>
      <span>${a}</span>
    </button>`).join("");

  document.querySelectorAll(".option").forEach(btn => {
    btn.onclick = () => choose(btn, decodeURIComponent(btn.dataset.answer));
  });
}

function choose(btn, value) {
  if (selected !== null) return;
  selected = value;

  const right = questions[index].a;
  const ok = value === right;
  if (ok) correct++;

  results.push({ q: questions[index].q, value, right, ok });

  document.querySelectorAll(".option").forEach(x => {
    const ans = decodeURIComponent(x.dataset.answer);
    if (ans === right) x.classList.add("correct");
    if (ans === value) x.classList.add("selected");
  });

  if (!ok) btn.classList.add("wrong");

  $("feedback").innerHTML = `
    <div class="answer ${ok ? "" : "bad"}">
      ${ok ? "✅ Верно!" : "❌ Неверно."}
      Правильный ответ: <b>${right}</b>
    </div>`;

  $("next").disabled = false;
  $("answered").textContent = `Правильных: ${correct}`;
}

function next() {
  if (index < questions.length - 1) {
    index++;
    render();
  } else {
    finish();
  }
}

function finish() {
  clearInterval(interval);
  // если время вышло на неотвеченном вопросе – фиксируем как пропущенный
  if (selected === null && index < questions.length) {
    const item = questions[index];
    results.push({ q: item.q, value: "(не отвечен)", right: item.a, ok: false });
  }

  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");

  const total = questions.length;
  const percent = Math.round(correct / total * 100);
  $("score").textContent = `${correct} / ${total}`;
  $("resultText").textContent =
    `Результат: ${percent}%. ${percent >= 70 ? "Тест пройден!" : "Попробуйте ещё раз, чтобы улучшить результат."}`;

  $("review").innerHTML = results
    .filter(x => !x.ok)
    .map(x => `
      <details>
        <summary>❌ ${x.q}</summary>
        <p>Ваш ответ: ${x.value}</p>
        <p><b>Правильный ответ: ${x.right}</b></p>
      </details>`)
    .join("");
}
</script>
</body>
</html>
