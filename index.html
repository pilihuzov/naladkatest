</section>
</main>

const data=raw.map(x=>{let [q,a]=x.split("|");return{q,a}});

function startTest(){document.getElementById("start").classList.add("hidden");document.getElementById("quiz").classList.remove("hidden");timer=setInterval(tick,1000);show()}

function shuffle(a){return a.sort(()=>Math.random()-.5)}
function show(){chosen=null;let d=data[i];document.getElementById("question").textContent=(i+1)+". "+d.q;document.getElementById("count").textContent=`Вопрос ${i+1} из ${data.length}`;document.getElementById("answered").textContent=`Правильных: ${score}`;document.getElementById("bar").style.width=(i/data.length*100)+"%";document.getElementById("feedback").innerHTML="";document.getElementById("next").disabled=true;let opts=shuffle([d.a,...shuffle(pool.filter(x=>x!==d.a)).slice(0,3)]);document.getElementById("options").innerHTML=opts.map((x,n)=>`<button class="option" onclick="choose(this,${JSON.stringify(x).replace(/</g,"\\u003c")})"><span class="letter">${"АБВГ"[n]}</span><span>${x}</span></button>`).join("")}
function choose(el,val){if(chosen!==null)return;chosen=val;let right=data[i].a;document.querySelectorAll(".option").forEach(x=>x.disabled=true);el.classList.add("selected");let ok=val===right;if(ok)score++;answers.push({q:data[i].q,chosen:val,right,ok});document.getElementById("feedback").innerHTML=`<div class="answer ${ok?"":"bad"}">${ok?"✅ Верно!":"❌ Неверно."} Правильный ответ: <b>${right}</b></div>`;document.getElementById("next").disabled=false;document.getElementById("answered").textContent=`Правильных: ${score}`}
function nextQuestion(){if(i<data.length-1){i++;show()}else finish()}
function finish(){clearInterval(timer);document.getElementById("quiz").classList.add("hidden");document.getElementById("result").classList.remove("hidden");let p=Math.round(score/data.length*100);document.getElementById("score").textContent=`${score} / ${data.length}`;document.getElementById("resultText").textContent=`Результат: ${p}%. ${p>=70?"Тест пройден!":"Попробуйте ещё раз, чтобы улучшить результат."}`;document.getElementById("review").innerHTML=answers.filter(x=>!x.ok).map(x=>`<details><summary>❌ ${x.q}</summary><p>Ваш ответ: ${x.chosen}</p><p><b>Правильно: ${x.right}</b></p></details>`).join("")}
</script>
</body>
</html>
